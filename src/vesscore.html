        window.printOverallSummary = () => {
            const tableHtml = document.getElementById('overall-summary-table').innerHTML;
            const printWindow = window.open('', '', 'height=700,width=1100');
            printWindow.document.write('<html><head><title>Overall Grand Ranking</title>');
            printWindow.document.write(`

        window.importCriteria = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if (!confirm(`Import ${jsonData.length} criteria entries? Required columns: segment, label, min, max, weight`)) return;

                const categoryMap = {};
                for (const item of jsonData) {
                    if (item.segment && item.label) {
                        if (!categoryMap[item.segment]) {
                            const q = query(collection(db, "categories"), where("name", "==", item.segment));
                            const snap = await getDocs(q);
                            if (snap.empty) {
                                const newCat = await addDoc(collection(db, "categories"), { name: item.segment, createdAt: new Date() });
                                categoryMap[item.segment] = newCat.id;
                            } else {
                                categoryMap[item.segment] = snap.docs[0].id;
                            }
                        }
                        await addDoc(collection(db, "criteria"), {
                            category_id: categoryMap[item.segment],
                            label: item.label,
                            min_score: parseInt(item.min || 0),
                            max_score: parseInt(item.max),
                            weight: parseInt(item.weight)
                        });
                    }
                }
                alert("Criteria imported successfully!");
                location.reload();
            };
            reader.readAsArrayBuffer(file);
        };

        window.exportCriteriaTemplate = async () => {
            const catSnap = await getDocs(collection(db, "categories"));
            const critSnap = await getDocs(collection(db, "criteria"));
            const data = critSnap.docs.map(d => {
                const crit = d.data();
                const cat = catSnap.docs.find(c => c.id === crit.category_id);
                return {
                    "segment": cat ? cat.data().name : "Unknown",
                    "label": crit.label,
                    "min": crit.min_score,
                    "max": crit.max_score,
                    "weight": crit.weight
                };
            });
            const ws = XLSX.utils.json_to_sheet(data.length ? data : [{"segment":"EVENT NAME", "label":"CRITERIA NAME", "min":75, "max":100, "weight":20}]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Criteria");
            XLSX.writeFile(wb, "Criteria_Template.xlsx");
        };

        window.importCandidates = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                if (jsonData.length === 0) { alert("File is empty!"); return; }
                const confirmImport = confirm(`Import ${jsonData.length} candidates? Make sure column headers are: name, category, candidate_no`);
                if (!confirmImport) return;
                for (const item of jsonData) {
                    if (item.name && item.category && item.candidate_no) {
                        await addDoc(collection(db, "candidates"), {
                            name: item.name.toString(),
                            category: item.category.toString().toUpperCase(),
                            candidate_no: parseInt(item.candidate_no),
                            createdAt: new Date()
                        });
                    }
                }
                alert(`Successfully imported candidates!`);
                event.target.value = "";
            };
            reader.readAsArrayBuffer(file);
        };

        window.exportToExcel = (catName, results) => {
            const worksheet = XLSX.utils.json_to_sheet(results.map(r => ({
                "Rank": results.indexOf(r) + 1,
                "Candidate #": r.num,
                "Name": r.name,
                "Final Score": r.total.toFixed(2)
            })));
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Results");
            XLSX.writeFile(workbook, `${catName}_Results.xlsx`);
        };

        // Admin = a ROMIO master account (the hardcoded master email OR a user
        // whose ROMIO profile has isMaster == true). Everyone else is a judge.
        async function isRomioMaster(user) {
            if (!user) return false;
            if ((user.email || '').toLowerCase() === ROMIO_MASTER_EMAIL) return true;
            try { const s = await getDoc(doc(db, "users", user.uid)); return s.exists() && s.data().isMaster === true; }
            catch { return false; }
        }
        async function checkAdminSession(user) {
            if (await isRomioMaster(user)) showView('view-master');
        }

        async function initSystem() {
            const log = document.getElementById('conn-log');
            const urlParams = new URLSearchParams(window.location.search);
            const urlKey = urlParams.get('key');
            if (urlKey) {
                document.getElementById('judge-input').value = urlKey;
                setTimeout(() => window.loginJudge(), 1000);
            }
            onAuthStateChanged(auth, async (user) => {
                if (user && await isRomioMaster(user)) {
                    log.innerText = `ADMIN CONNECTED: ${user.email}`;
                    log.style.background = "#064e3b";
                    checkAdminSession(user);
                } else {
                    log.innerText = "JUDGE MODE";
                    log.style.background = "#064e3b";
                }
            });
            if(savedTheme === 'dark') document.getElementById('checkbox').checked = true;
        }
        initSystem();

        window.deleteEntry = async (col, id) => {
            const confirmDeletion = () => {
                return new Promise((resolve) => {
                    const overlay = document.createElement("div");
                    Object.assign(overlay.style, { position: "fixed", top: "0", left: "0", width: "100vw", height: "100vh", backgroundColor: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: "10000" });
                    const modal = document.createElement("div");
                    Object.assign(modal.style, { backgroundColor: "white", padding: "25px", borderRadius: "8px", textAlign: "center", maxWidth: "400px" });
                    modal.innerHTML = `<h3 style="color:#d93025;">Are you sure?</h3><p>This will PERMANENTLY delete associated scores.</p><div style="margin-top:20px; display:flex; gap:10px; justify-content:center;"><button id="cancelBtn">Cancel</button><button id="confirmBtn" style="background:#d93025; color:white;">Yes, Delete</button></div>`;
                    overlay.appendChild(modal);
                    document.body.appendChild(overlay);
                    document.getElementById("cancelBtn").onclick = () => { overlay.remove(); resolve(false); };
                    document.getElementById("confirmBtn").onclick = () => { overlay.remove(); resolve(true); };
                });
            };
            if (!(await confirmDeletion())) return;
            const batch = writeBatch(db);
            const scoreRefs = await getDocs(collection(db, "scores"));
            scoreRefs.forEach(sDoc => {
                const data = sDoc.data();
                if (data.candidate_id === id || data.criteria_id === id || data.category_id === id) batch.delete(sDoc.ref);
            });
            batch.delete(doc(db, col, id));
            await batch.commit();
        };

        window.addCandidate = async () => {
            const catSnap = await getDocs(collection(db, "categories"));
            if(catSnap.empty) { alert("Please add a Segment/Event first."); return; }
            let catOptions = catSnap.docs.map((d, i) => `${i+1}. ${d.data().name}`).join('\n');
            const catIdx = prompt(`Select Event Number:\n${catOptions}`);
            if(!catIdx) return;
            const selectedCat = catSnap.docs[parseInt(catIdx)-1].data().name;
            const name = prompt(`Candidate Name for ${selectedCat}:`);
            const num = prompt(`Assign Candidate Number:`);
            if (name && num) await addDoc(collection(db, "candidates"), { name, category: selectedCat, candidate_no: parseInt(num), createdAt: new Date() });
        };

        window.editCandidate = async (id, name, cat, num) => {
            const newName = prompt("Edit Name:", name);
            const newCat = prompt("Edit Category:", cat)?.toUpperCase();
            const newNum = prompt("Edit Number:", num);
            if (newName && newCat && newNum) await updateDoc(doc(db, "candidates", id), { name: newName, category: newCat, candidate_no: parseInt(newNum) });
        };

        window.addCategory = async () => {
            const name = prompt("Segment/Event Name:");
            if (name) await addDoc(collection(db, "categories"), { name, createdAt: new Date() });
        };

        window.editCategory = async (id, oldName) => {
            const newName = prompt("Edit Segment/Event Name:", oldName);
            if (newName) await updateDoc(doc(db, "categories", id), { name: newName });
        };

        window.addCriteria = async (catId) => {
            const label = prompt("Criteria Name:");
            const min = parseInt(prompt("Min Score (e.g., 75):") || 0);
            const max = parseInt(prompt("Max Score (e.g., 100):"));
            const weight = parseInt(prompt("Percentage Weight (e.g., 30 for 30%):"));
            if (label && max && weight) await addDoc(collection(db, "criteria"), { category_id: catId, label, min_score: min, max_score: max, weight: weight });
        };

        window.editCriteria = async (id, oldLabel, oldMin, oldMax, oldWeight) => {
            const label = prompt("Edit Criteria Name:", oldLabel);
            const min = prompt("Edit Min Score:", oldMin);
            const max = prompt("Edit Max Score:", oldMax);
            const weight = prompt("Edit Weight %:", oldWeight);
            if (label && min !== null && max && weight) await updateDoc(doc(db, "criteria", id), { label, min_score: parseInt(min), max_score: parseInt(max), weight: parseInt(weight) });
        };

        window.generateJudgeLink = async () => {
            const judgeName = prompt("Judge Name:");
            if (!judgeName) return;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let passkey = "";
            for (let i = 0; i < 6; i++) passkey += chars.charAt(Math.floor(Math.random() * chars.length));
            await addDoc(collection(db, "judges"), { name: judgeName, passkey: passkey, createdAt: new Date() });
        };

        window.editJudge = async (id, oldName) => {
            const newName = prompt("Edit Judge Name:", oldName);
            if (newName) await updateDoc(doc(db, "judges", id), { name: newName });
        };

        window.copyToClipboard = (text) => {
            navigator.clipboard.writeText(text).then(() => {
                const n = document.createElement("div");
                n.innerText = "Passkey copied!";
                Object.assign(n.style, { position: "fixed", bottom: "20px", left: "50%", transform: "translateX(-50%)", backgroundColor: "#333", color: "#fff", padding: "10px 20px", borderRadius: "5px", zIndex: "9999" });
                document.body.appendChild(n);
                setTimeout(() => n.remove(), 2000);
            });
        };

        window.showQR = (link, name) => {
            const modal = document.getElementById('qr-modal');
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; 
            new QRCode(qrContainer, { text: link, width: 200, height: 200 });
            document.getElementById('qr-judge-name').innerText = name;
            modal.style.display = "flex";
        };

        window.closeQR = () => document.getElementById('qr-modal').style.display = "none";

        window.refreshMaster = async () => {
            onSnapshot(query(collection(db, "judges"), orderBy("name", "asc")), (snap) => {
                const baseUrl = `${window.location.origin}/tabulation/judge`; // judges land on the judge route
                document.getElementById('judge-list').innerHTML = snap.docs.map(doc => {
                    const data = doc.data();
                    const judgeLink = `${baseUrl}?key=${data.passkey}`;
                    return `
                    <div class="card-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <span style="font-weight:bold;">${data.name}</span>
                            <code>${data.passkey}</code>
                        </div>
                        <div style="display: flex; gap: 5px; width: 100%;">
                            <button class="secondary" onclick="editJudge('${doc.id}', '${data.name}')" style="font-size: 10px; padding: 5px 10px;">Edit</button>
                            <button class="secondary" onclick="copyToClipboard('${data.passkey}')" style="font-size: 10px; padding: 5px 10px;">Copy Passkey</button>
                            <button class="secondary" onclick="showQR('${judgeLink}', '${data.name}')" style="font-size: 10px; padding: 5px 10px;">QR</button>
                            <button class="secondary btn-danger" onclick="deleteEntry('judges', '${doc.id}')" style="color:red; border-color:red; padding:5px 10px; margin-left: auto;">Delete</button>
                        </div>
                    </div>`;
                }).join('');
            });

            onSnapshot(query(collection(db, "candidates"), orderBy("category", "asc"), orderBy("candidate_no", "asc")), (snap) => {
                const candidates = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('candidate-list').innerHTML = candidates.map(c => `
                    <div class="card-item" style="flex-direction:column; align-items:flex-start;">
                        <div style="width:100%; display:flex; justify-content:space-between;">
                            <strong>#${c.candidate_no} - ${c.name}</strong>
                            <small>${c.category}</small>
                        </div>
                        <div style="margin-top:5px; display:flex; gap:5px;">
                            <button class="secondary" onclick="editCandidate('${c.id}', '${c.name}', '${c.category}', ${c.candidate_no})" style="font-size:10px; padding:2px 8px;">Edit</button>
                            <button class="secondary btn-danger" onclick="deleteEntry('candidates', '${c.id}')" style="font-size:10px; padding:2px 8px; color:red; border-color:red;">Delete</button>
                        </div>
                    </div>`).join('');

                onSnapshot(collection(db, "categories"), (catSnap) => {
                    const container = document.getElementById('master-results');
                    const auditContainer = document.getElementById('score-audit-container');
                    const criteriaRankContainer = document.getElementById('rank-per-criteria-container');
                    const overallContainer = document.getElementById('overall-summary-container');

                    container.innerHTML = "";
                    auditContainer.innerHTML = "";
                    criteriaRankContainer.innerHTML = "";
                    overallContainer.innerHTML = "";

                    const cats = catSnap.docs.map(d => ({id: d.id, ...d.data()}));
                    const grandRanking = {}; 

                    catSnap.forEach(catDoc => {
                        const catId = catDoc.id;
                        const catName = catDoc.data().name;

                        const catDiv = document.createElement('div');
                        catDiv.className = "card";
                        catDiv.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px;">
                                <h3 style="margin:0;">${catName}</h3>
                                <div style="display:flex; gap:5px;">
                                    <button class="secondary" onclick="editCategory('${catId}', '${catName}')" style="font-size:10px;">Edit</button>
                                    <button class="secondary" onclick="window.printRanking('${catId}', '${catName}')" style="font-size:10px;">Print Ranking</button>
                                    <button class="secondary" onclick="window.printBreakdown('${catId}', '${catName}')" style="font-size:10px;">Print Breakdown</button>
                                    <button id="export-btn-${catId}" class="secondary" style="font-size:10px;">Export Excel</button>
                                    <button class="secondary btn-danger" onclick="deleteEntry('categories', '${catId}')" style="color:red; border-color:red; font-size:10px;">Delete</button>
                                </div>
                            </div>
                            <div style="border: 1px solid var(--border); padding:10px; border-radius:8px; margin-bottom:15px; background:var(--surface);">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <h4 style="margin:0; font-size:11px;">CRITERIA & WEIGHTS</h4>
                                    <button onclick="addCriteria('${catId}')" style="font-size:10px; padding:2px 10px;">+ Add</button>
                                </div>
                                <div id="crit-list-${catId}" style="margin-top:10px;"></div>
                            </div>
                            <div id="results-${catId}">Calculating...</div>`;
                        container.appendChild(catDiv);

                        const auditDiv = document.createElement('div');
                        auditDiv.className = "card";
                        auditDiv.style = "grid-column: 1 / -1; overflow-x: auto;";
                        auditDiv.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <h3 style="margin:0;">Score Breakdown: ${catName}</h3>
                                <button class="secondary" onclick="window.printBreakdown('${catId}', '${catName}')" style="font-size:10px;">Print Breakdown Table</button>
                            </div>
                            <div id="audit-table-${catId}">Loading Table...</div>`;
                        auditContainer.appendChild(auditDiv);

                        const rankDiv = document.createElement('div');
                        rankDiv.className = "card";
                        rankDiv.style = "grid-column: 1 / -1; overflow-x: auto;";
                        rankDiv.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                <h3 style="margin:0;">Rankings Per Criteria: ${catName}</h3>
                                <button class="secondary" onclick="window.printCriteriaRanking('${catId}', '${catName}')" style="font-size:10px;">Print Criteria Rankings</button>
                            </div>
                            <div id="rank-table-${catId}">Loading Ranks...</div>`;
                        criteriaRankContainer.appendChild(rankDiv);

                        onSnapshot(query(collection(db, "criteria"), where("category_id", "==", catId)), (critSnap) => {
                            const crits = critSnap.docs.map(d => ({id: d.id, ...d.data()}));
                            document.getElementById(`crit-list-${catId}`).innerHTML = crits.map(cr => `
                                <div class="card-item" style="padding:5px; font-size:11px; border-bottom: 1px dashed var(--border);">
                                    <span>${cr.label} (${cr.weight}%)</span>
                                    <div>
                                        <button class="secondary" onclick="editCriteria('${cr.id}', '${cr.label}', ${cr.min_score || 0}, ${cr.max_score}, ${cr.weight})" style="font-size:9px; padding:1px 4px;">Edit</button>
                                        <button class="secondary btn-danger" onclick="deleteEntry('criteria', '${cr.id}')" style="font-size:9px; padding:1px 4px; color:red; border-color:red;">X</button>
                                    </div>
                                </div>`).join('') || "No criteria.";

                            onSnapshot(collection(db, "scores"), async (scoreSnap) => {
                                const allScores = scoreSnap.docs.map(d => d.data());
                                const judgeSnap = await getDocs(query(collection(db, "judges"), orderBy("name", "asc")));
                                const judges = judgeSnap.docs.map(d => ({id: d.id, ...d.data()}));
                                const judgeCount = judges.length || 1;
                                const eventCandidates = candidates.filter(can => can.category === catName);

                                const candidateCritData = eventCandidates.map(can => {
                                    const critAverages = {};
                                    let finalWeightedScore = 0;
                                    crits.forEach(crit => {
                                        const scoresForThisCrit = allScores.filter(s => s.candidate_id === can.id && s.criteria_id === crit.id);
                                        const rawSum = scoresForThisCrit.reduce((sum, s) => sum + s.raw_score, 0);
                                        const averageRaw = rawSum / judgeCount;
                                        critAverages[crit.id] = averageRaw;
                                        finalWeightedScore += (averageRaw * (crit.weight / 100));
                                    });

                                    if(!grandRanking[can.name]) {
                                        grandRanking[can.name] = { total: 0, events: {}, candidate_no: can.candidate_no };
                                    }
                                    grandRanking[can.name].events[catId] = finalWeightedScore;
                                    grandRanking[can.name].total += finalWeightedScore;

                                    return { id: can.id, name: can.name, num: can.candidate_no, critAverages, total: finalWeightedScore };
                                });

                                updateOverallTable(cats, grandRanking);

                                let rankTableHtml = `<table style="width:100%; border-collapse: collapse; font-size:12px; min-width:600px;">
                                    <thead><tr style="background:var(--surface);">
                                        <th>Candidate</th>${crits.map(cr => `<th>${cr.label}</th>`).join('')}
                                    </tr></thead><tbody>`;

                                candidateCritData.forEach(canData => {
                                    rankTableHtml += `<tr><td style="text-align:left; font-weight:bold;">#${canData.num} ${canData.name}</td>`;
                                    crits.forEach(cr => {
                                        const sortedForThisCrit = [...candidateCritData].sort((a, b) => b.critAverages[cr.id] - a.critAverages[cr.id]);
                                        const rank = sortedForThisCrit.findIndex(x => x.id === canData.id) + 1;
                                        const isTop = rank === 1 ? 'style="color:var(--accent); font-weight:bold; background:rgba(16,185,129,0.1);"' : '';
                                        rankTableHtml += `<td ${isTop}>Rank ${rank} <br><small>(${canData.critAverages[cr.id].toFixed(1)})</small></td>`;
                                    });
                                    rankTableHtml += `</tr>`;
                                });
                                document.getElementById(`rank-table-${catId}`).innerHTML = rankTableHtml + `</tbody></table>`;

                                if(document.getElementById(`export-btn-${catId}`)) {
                                    document.getElementById(`export-btn-${catId}`).onclick = () => window.exportToExcel(catName, candidateCritData.sort((a,b) => b.total - a.total));
                                }

                                document.getElementById(`results-${catId}`).innerHTML = [...candidateCritData].sort((a,b) => b.total - a.total).map(r => `
                                    <div class="card-item"><span>#${r.num} ${r.name}</span><strong style="color:var(--accent)">${r.total.toFixed(2)}</strong></div>`).join('') || "Waiting...";

                                let tableHtml = `<div style="overflow-x:auto;">
                                    <table style="width:100%; border-collapse: collapse; font-size:11px; min-width:1000px;">
                                    <thead>
                                        <tr style="background:var(--surface);">
                                            <th rowspan="2">CS</th>
                                            <th rowspan="2" style="text-align: left;">NAME</th>
                                            ${crits.map(c => `
                                                <th colspan="${judges.length}" style="border-bottom: 1px solid var(--border);">${c.label.toUpperCase()}</th>
                                                <th rowspan="2" style="background: rgba(16,185,129,0.1); color: var(--accent);">${c.weight}%</th>
                                            `).join('')}
                                            <th rowspan="2" style="background: var(--accent); color: #000;">TOTAL SCORE 100%</th>
                                        </tr>
                                        <tr style="background:var(--surface);">
                                            ${crits.map(() => 
                                                judges.map((j, idx) => `<th title="${j.name}">J${idx + 1}</th>`).join('')
                                            ).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>`;

                                eventCandidates.forEach(can => {
                                    let finalWeightedScore = 0;
                                    tableHtml += `<tr>
                                        <td style="font-weight: bold; background: var(--surface);">${can.candidate_no}</td>
                                        <td style="text-align: left; font-weight: bold; padding-left: 10px;">${can.name.toUpperCase()}</td>`;
                                    crits.forEach(cr => {
                                        let criteriaRawSum = 0;
                                        judges.forEach(j => {
                                            const s = allScores.find(score => 
                                                score.judge_id === j.id && 
                                                score.candidate_id === can.id && 
                                                score.criteria_id === cr.id
                                            );
                                            const rawVal = s ? s.raw_score : 0;
                                            criteriaRawSum += rawVal;
                                            tableHtml += `<td>${rawVal || '-'}</td>`;
                                        });
                                        const criteriaAverage = criteriaRawSum / (judges.length || 1);
                                        const weightedSegment = (criteriaAverage * (cr.weight / 100));
                                        finalWeightedScore += weightedSegment;
                                        tableHtml += `<td style="font-weight: bold; background: rgba(16,185,129,0.05);">${weightedSegment.toFixed(2)}</td>`;
                                    });
                                    tableHtml += `<td style="font-weight: bold; background: #f0fdf4; color: black; font-size: 13px;">${finalWeightedScore.toFixed(2)}</td></tr>`;
                                });
                                document.getElementById(`audit-table-${catId}`).innerHTML = tableHtml + `</tbody></table></div>`;
                            });
                        });
                    });
                });
            });
        };

        function updateOverallTable(categories, grandData) {
            const overallContainer = document.getElementById('overall-summary-container');
            if(!overallContainer) return;
            
            const candidateList = Object.keys(grandData).map(name => {
                const data = grandData[name];
                const participationCount = Object.keys(data.events).length;
                const grandAverage = participationCount > 0 ? (data.total / participationCount) : 0;
                return { name: name, candidate_no: data.candidate_no || '?', events: data.events, grandAverage: grandAverage };
            });

            candidateList.sort((a, b) => b.grandAverage - a.grandAverage);

            let html = `<div class="card" style="grid-column: 1 / -1; overflow-x: auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0;">OVERALL SCOREBOARD</h3>
                    <button class="secondary" onclick="window.printOverallSummary()">Print Overall Table</button>
                </div>
                <div id="overall-summary-table">
                <table><thead><tr style="background:var(--surface);">
                    <th style="width:80px;">Rank</th><th style="text-align:left; padding-left:15px;">Candidate Info</th>
                    ${categories.map(c => `<th>${c.name}</th>`).join('')}
                    <th style="background:var(--accent); color:#000; width:140px;">Grand Average</th></tr></thead><tbody>`;

            candidateList.forEach((can, index) => {
                const rank = index + 1;
                html += `<tr>
                    <td style="${rank <= 3 ? 'color:var(--accent); font-weight:bold;' : ''}">RANK ${rank}</td>
                    <td style="text-align:left; font-weight:bold; padding-left:15px;">
                        <span style="background:var(--accent); color:#000; padding:2px 6px; border-radius:4px; margin-right:10px;">#${can.candidate_no}</span>
                        ${can.name.toUpperCase()}
                    </td>
                    ${categories.map(c => `<td>${(can.events[c.id] || 0).toFixed(2)}</td>`).join('')}
                    <td style="color:var(--accent); font-weight:bold; font-size:1.2em;">${can.grandAverage.toFixed(2)}</td>
                </tr>`;
            });
            html += `</tbody></table></div></div>`;
            overallContainer.innerHTML = html;
        }

        window.loginJudge = async () => {
            const val = document.getElementById('judge-input').value.toUpperCase().trim();
            const q = query(collection(db, "judges"), where("passkey", "==", val));
            const snap = await getDocs(q);
            if (!snap.empty) {
                window.activeJudge = { id: snap.docs[0].id, ...snap.docs[0].data() };
                document.getElementById('current-judge-name').innerText = "Judge: " + window.activeJudge.name;
                window.showView('view-select-event');
                window.loadEventsForJudge();
            } else alert("Invalid Key");
        };

        window.loadEventsForJudge = async () => {
            const container = document.getElementById('event-grid');
            onSnapshot(collection(db, "categories"), (snap) => {
                container.innerHTML = snap.docs.map(doc => `
                    <div class="card" style="cursor:pointer; text-align:center; border-left: 5px solid var(--accent);" onclick="startScoringEvent('${doc.id}', '${doc.data().name}')">
                        <h3 style="margin:0;">${doc.data().name}</h3>
                        <p style="font-size:12px; opacity:0.7; margin-top:10px;">Open scoresheet</p>
                    </div>
                `).join('') || "<p>No events available yet.</p>";
            });
        };

        window.startScoringEvent = (catId, catName) => {
            window.activeCategory = { id: catId, name: catName };
            document.getElementById('current-judge-ui').innerText = `Judge: ${window.activeJudge.name} | ${catName}`;
            window.showView('view-scoring');
            window.loadScoring();
        };

        window.loadScoring = async () => {
            const scoringContainer = document.getElementById('scoring-sheets');
            scoringContainer.innerHTML = "<p>Loading...</p>";
            const cSnap = await getDocs(query(collection(db, "candidates"), where("category", "==", window.activeCategory.name), orderBy("candidate_no", "asc")));
            const crSnap = await getDocs(query(collection(db, "criteria"), where("category_id", "==", window.activeCategory.id)));
            const sSnap = await getDocs(query(collection(db, "scores"), where("judge_id", "==", window.activeJudge.id), where("category_id", "==", window.activeCategory.id)));
            const candidates = cSnap.docs.map(d => ({id: d.id, ...d.data()}));
            const crits = crSnap.docs.map(d => ({id: d.id, ...d.data()}));
            const scores = {};
            sSnap.docs.forEach(d => scores[`${d.data().candidate_id}_${d.data().criteria_id}`] = d.data().raw_score);

            let html = `<button class="secondary" onclick="showView('view-select-event')" style="margin-bottom:20px;">← Back</button>`;
            candidates.forEach(c => {
                html += `<div class="card"><h3 style="color:var(--accent)">#${c.candidate_no} - ${c.name}</h3>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top:10px;">
                ${crits.map(cr => `<div style="background:var(--surface); padding:10px; border-radius:8px;">
                    <label style="font-size:11px; font-weight:bold;">${cr.label} (${cr.weight}%)</label>
                    <input type="number" value="${scores[`${c.id}_${cr.id}`] || ''}" oninput="window.saveScore('${c.id}', '${cr.id}', '${window.activeCategory.id}', this.value, ${cr.min_score}, ${cr.max_score}, this)" placeholder="${cr.min_score}-${cr.max_score}">
                </div>`).join('')}</div></div>`;
            });
            html += `<div style="text-align:center;"><button id="btn-sync" onclick="syncAllScores()">SYNC ALL SCORES</button></div>`;
            scoringContainer.innerHTML = html;
        };

        window.saveScore = async (candId, critId, catId, val, min, max, element) => {
            if(val === "") return;
            const score = parseFloat(val);
            if (score < min || score > max) { element.style.borderColor = "red"; return; }
            element.style.borderColor = "var(--accent)";
            await setDoc(doc(db, "scores", `${window.activeJudge.id}_${candId}_${critId}`), { judge_id: window.activeJudge.id, candidate_id: candId, criteria_id: critId, category_id: catId, raw_score: score, timestamp: new Date() });
            document.getElementById('sync-status').innerText = "● Auto-Saving...";
            setTimeout(() => document.getElementById('sync-status').innerText = "● Draft Saved", 1000);
        };

        window.deleteAllRecords = async (collectionName) => {
            if (prompt(`Type "DELETE ALL" to wipe all ${collectionName}:`) !== "DELETE ALL") return;
            const batch = writeBatch(db);
            const snap = await getDocs(collection(db, collectionName));
            snap.forEach(d => batch.delete(d.ref));
            if(collectionName === 'judges') {
                const s = await getDocs(collection(db, "judge_syncs"));
                s.forEach(d => batch.delete(d.ref));
            }
            await batch.commit();
            alert("Deleted all records.");
            location.reload();
        };

        window.syncAllScores = async () => {
            const syncRef = doc(db, "judge_syncs", `${window.activeJudge.id}_${window.activeCategory.id}`);
            await setDoc(syncRef, { judge_id: window.activeJudge.id, judge_name: window.activeJudge.name, category_id: window.activeCategory.id, syncedAt: new Date(), status: "FINISHED" });
            alert("Scores Finalized!");
        };

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'view-master') window.refreshMaster();
            // Reflect the active view in the URL (/tabulation, /master, /judge).
            const path = id === 'view-master' ? '/tabulation/master'
                : id === 'view-scoring' ? '/tabulation/judge'
                : '/tabulation';
            try { const q = window.location.search || ''; history.replaceState(null, '', path + q); } catch (e) {}
        };

        window.masterAccess = () => auth.currentUser ? window.showView('view-master') : alert("Admin required");
    </script>

    <style>
        :root { --bg: #ffffff; --surface: #f8fafc; --text: #064e3b; --accent: #10b981; --border: #e2e8f0; --card: #ffffff; --shadow: rgba(0,0,0,0.05); }
        [data-theme="dark"] { --bg: #000000; --surface: #0a0a0a; --text: #ffffff; --accent: #ffffff; --border: #333333; --card: #111111; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; }
        #conn-log { background: #333; color: white; padding: 5px; text-align: center; font-size: 10px; position: sticky; top: 0; z-index: 9999; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .view { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .view.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 10px var(--shadow); }
        .card-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--border); align-items: center; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        button { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; background: var(--accent); color: #000; font-size: 12px; }
        button.secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        button.btn-danger { color: #ff4444 !important; border-color: #ff4444 !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: center; }
        .logo-img { height: 35px; }
        @media (max-width: 600px) {
            nav { padding: 10px; }
            .view { padding: 10px; }
            h2 { font-size: 1.2rem; }
            button { padding: 6px 10px; font-size: 11px; }
        }
        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch { display: inline-block; height: 30px; position: relative; width: 60px; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; display: flex; align-items: center; justify-content: space-between; padding: 0 5px; }
        .slider:before { background-color: #fff; bottom: 4px; content: ""; height: 22px; left: 4px; position: absolute; transition: .4s; width: 22px; z-index: 2; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(30px); }
        .slider.round { border-radius: 34px; }
        .slider.round:before { border-radius: 50%; }
        .icon { font-size: 14px; user-select: none; }
        [data-theme="dark"] .slider { background-color: #333; }
    </style>
</head>
<body>

<div id="conn-log">System Initializing...</div>
<nav>
    <img src="images/1.png" alt="ESSCORE" class="logo-img">
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" onclick="toggleTheme()" />
            <div class="slider round">
                <span class="icon moon">🌙</span>
                <span class="icon sun">☀️</span>
            </div>
        </label>
    </div>
</nav>

<section id="view-login" class="view active">
    <div style="max-width: 350px; margin: 50px auto; text-align: center;">
        <img src="images/1.png" alt="ESSCORE" style="max-width: 300px;">
        <div class="card">
            <h3>Judge Login</h3>
            <input type="text" id="judge-input" placeholder="PASSKEY" maxlength="6" style="text-align: center; font-size: 1.5rem;">
            <button onclick="loginJudge()" style="width: 100%; margin-top: 20px;">Enter Dashboard</button>
        </div>
        <button class="secondary" onclick="masterAccess()" style="width: 100%; border:none; opacity:0.5;">Admin Access</button>
    </div>
</section>

<section id="view-select-event" class="view">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="current-judge-name" style="margin:0;">Welcome</h2>
        <button class="secondary btn-danger" onclick="exitJudging()">Exit Judging</button>
    </div>
    <div id="event-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;"></div>
</section>

<section id="view-master" class="view">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
        <h2>Master Control</h2>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="secondary btn-danger" onclick="deleteAllRecords('judges')">Wipe Judges</button>
            <button class="secondary btn-danger" onclick="deleteAllRecords('candidates')">Wipe Candidates</button>
            <button class="secondary" onclick="exportCriteriaTemplate()">↓ Template Export</button>
            <label class="button" style="background:var(--accent);color:black; padding:8px 15px; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold;">
                ↑ Import Criteria <input type="file" accept=".xlsx" onchange="importCriteria(event)" style="display:none;">
            </label>
            <label class="button" style="background:var(--accent); color:black; padding:8px 15px; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold;">
                ↑ Import Candidates <input type="file" accept=".xlsx" onchange="importCandidates(event)" style="display:none;">
            </label>
            <button onclick="addCandidate()">+ Candidate</button>
            <button onclick="generateJudgeLink()">+ Judge</button>
            <button onclick="addCategory()">+ Segment</button>
        </div>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;">
        <div class="card"><h3>Judges</h3><div id="judge-list"></div></div>
        <div class="card"><h3>Candidates</h3><div id="candidate-list"></div></div>
        <div id="overall-summary-container" style="display: contents;"></div> 
        <div id="master-results" style="display: contents;"></div>
        <div id="rank-per-criteria-container" style="display: contents;"></div>
        <div id="score-audit-container" style="display: contents;"></div>
    </div>
</section>

<section id="view-scoring" class="view">
    <div class="card" style="position: sticky; top: 40px; z-index: 100;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="current-judge-ui" style="margin:0;">Scoring</h2>
            <button class="secondary btn-danger" onclick="exitJudging()" style="font-size: 10px;">Exit Judging</button>
        </div>
        <small id="sync-status">Ready</small>
    </div>
    <div id="scoring-sheets"></div>
</section>

<div id="qr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
    <div class="card" style="text-align:center; max-width: 300px;">
        <h3 id="qr-judge-name">Judge</h3>
        <div id="qrcode" style="padding:10px; background:white;"></div>
        <button onclick="closeQR()" style="width:100%; margin-top:15px;">Close</button>
    </div>
</div>

</body>
</html>
