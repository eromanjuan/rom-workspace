<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROMIO logo">
  <defs>
    <!-- soft grayscale halo spreading toward the tile edges -->
    <radialGradient id="y-halo" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#d4d4d4" stop-opacity="0.50"/>
      <stop offset="42%" stop-color="#8a8a8a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- the glowing orb: white core fading through gray into the black tile -->
    <radialGradient id="y-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="16%" stop-color="#f2f2f2"/>
      <stop offset="34%" stop-color="#d2d2d2"/>
      <stop offset="52%" stop-color="#9c9c9c"/>
      <stop offset="70%" stop-color="#5a5a5a"/>
      <stop offset="86%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>
  <rect width="512" height="512" rx="112" fill="url(#y-halo)"/>
  <circle cx="256" cy="256" r="156" fill="url(#y-orb)"/>
</svg>
